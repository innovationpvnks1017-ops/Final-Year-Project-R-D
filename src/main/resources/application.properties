spring.application.name=hvac-intelligent-predictor
# Server configuration
server.port=8080

# MySQL Connection (Change username and password to your MySQL Workbench settings)
spring.datasource.url=jdbc:mysql://localhost:3306/hvac_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=joyram1
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate settings
# 'update' will create the table for you automatically if it doesn't exist
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Thymeleaf
spring.thymeleaf.cache=false