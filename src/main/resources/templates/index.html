<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLIMATESYNC | Predictive HVAC Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-body: #0a0e17; --bg-card: #111827; --border-card: #1f2937;
            --text-main: #f3f4f6; --text-muted: #9ca3af; --primary: #06b6d4;
            --success: #10b981; --danger: #ef4444; --warning: #f59e0b;
        }
        body { background-color: var(--bg-body); color: var(--text-main); font-family: 'Segoe UI', sans-serif; font-size: 15px; }
        .card { border-radius: 12px; background: var(--bg-card); border: 1px solid var(--border-card); transition: all 0.3s ease; }
        .app-logo { font-size: 1.6rem; font-weight: 800; color: var(--primary); text-transform: uppercase; letter-spacing: 1px; }
        .pref-visualizer { display: flex; justify-content: space-between; background: rgba(255,255,255,0.03); padding: 12px; border-radius: 8px; border: 1px solid var(--border-card); margin-bottom: 20px; }
        .btn-predict { background: var(--primary); color: #fff; border-radius: 10px; font-weight: 700; padding: 14px; border: none; }
        .metric-card { padding: 1.5rem; display: flex; align-items: start; gap: 1.2rem; }
        .metric-icon { width: 55px; height: 55px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; background: rgba(255,255,255,0.05); }
        .metric-value { font-size: 2rem; font-weight: 800; color: var(--text-main); line-height: 1.1; }
        .rec-section { background: rgba(6, 182, 212, 0.05); border: 1px solid rgba(6, 182, 212, 0.2); padding: 1.5rem; border-radius: 12px; margin-bottom: 2rem; }
        .chart-section { position: relative; height: 380px; width: 100%; margin-top: 2rem; }
        .waiting-state { text-align: center; padding: 6rem 0; color: var(--text-muted); }
    </style>
</head>
<body>

<div class="container-fluid p-4">
    <div class="row g-4">
        <div class="col-xl-3 col-lg-4 col-md-12">
            <div class="card p-4 shadow h-100">
                <div class="app-logo mb-4"><i class="fa-solid fa-rotate me-2"></i>CLIMATE<span>SYNC</span></div>
                <form action="/get-recommendation" method="post">
                    <div class="mb-4">
                        <label class="form-label text-muted small fw-bold">MONITORED ZONE</label>
                        <select name="city" class="form-select form-select-lg bg-dark text-white border-0" required>
                            <option value="Delhi">Delhi - NCR Zone</option>
                            <option value="Mumbai">Mumbai - Financial</option>
                            <option value="Kolkata">Kolkata - East Zone</option>
                            <option value="Bangalore">Bangalore - IT Hub</option>
                        </select>
                    </div>
                    <div class="mb-2">
                        <label class="form-label text-muted small fw-bold">PREFERENCE</label>
                        <input type="range" name="slider" class="form-range" min="0" max="100" step="1" th:value="${result != null ? result.sliderValue : 50}">
                    </div>
                    <div class="pref-visualizer small fw-bold">
                        <span class="text-success">ECO</span><span class="text-info">COMFORT</span>
                    </div>
                    <button type="submit" class="btn-predict w-100 shadow"><i class="fa-solid fa-brain me-2"></i>ANALYZE</button>
                </form>
            </div>
        </div>

        <div class="col-xl-9 col-lg-8 col-md-12">
            <div th:if="${result != null and result.impactLevel != 'UNKNOWN'}">
                <div class="row g-3 mb-4">
                    <div class="col-md-4">
                        <div class="card metric-card">
                            <div class="metric-icon text-info"><i class="fa-solid fa-temperature-half"></i></div>
                            <div><div class="small text-muted fw-bold">CURRENT</div><div class="metric-value" th:text="${result.currentTemp} + '°C'"></div></div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card metric-card">
                            <div class="metric-icon text-warning"><i class="fa-solid fa-chart-line"></i></div>
                            <div><div class="small text-muted fw-bold">PREDICTED PEAK</div><div class="metric-value" th:text="${result.predictedMax} + '°C'"></div></div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card metric-card">
                            <div class="metric-icon text-success"><i class="fa-solid fa-snowflake"></i></div>
                            <div><div class="small text-muted fw-bold">TARGET AC</div><div class="metric-value" th:text="${result.targetAcSetting} + '°C'"></div></div>
                        </div>
                    </div>
                </div>

                <div class="card p-4 shadow">
                    <div class="rec-section">
                        <div class="row align-items-center">
                            <div class="col-md-9">
                                <div class="text-info fw-bold small mb-1">PREDICTIVE ACTION</div>
                                <div class="h4 fw-bold mb-0" th:text="${result.actionMessage}"></div>
                            </div>
                            <div class="col-md-3 text-end">
                                <span class="badge p-3" th:classappend="${result.impactLevel == 'HIGH' ? 'bg-danger' : 'bg-success'}" th:text="${result.impactLevel} + ' IMPACT'"></span>
                            </div>
                        </div>
                    </div>
                    <div class="chart-section"><canvas id="predictionChart"></canvas></div>
                </div>
            </div>

            <div th:if="${result == null}" class="card waiting-state h-100 shadow border-0">
                <i class="fa-solid fa-satellite fa-6x mb-4 opacity-25"></i>
                <h2 class="fw-bold">Nexus System Offline</h2>
                <p class="text-muted">Initiate analysis to sync real-time weather and ML models.</p>
            </div>

            <div th:if="${result != null and result.impactLevel == 'UNKNOWN'}" class="alert alert-danger p-4 rounded-4 shadow">
                <i class="fa-solid fa-triangle-exclamation me-2"></i>
                <span th:text="${result.actionMessage}"></span>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script th:if="${result != null and result.chartValues != null}" th:inline="javascript">
    /*<![CDATA[*/
    document.addEventListener("DOMContentLoaded", function() {
        const ctx = document.getElementById('predictionChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: /*[[${result.chartLabels}]]*/ [],
                datasets: [{
                    label: 'Thermal Load (°C)',
                    data: /*[[${result.chartValues}]]*/ [],
                    borderColor: '#06b6d4',
                    borderWidth: 3,
                    fill: true,
                    backgroundColor: 'rgba(6, 182, 212, 0.1)',
                    tension: 0.4
                }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });
    });
    /*]]>*/
</script>
</body>
</html>
